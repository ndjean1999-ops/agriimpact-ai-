<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriImpact AI — Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#171C14; --paper:#F5EFE0; --terracotta:#C9622B; --terracotta-deep:#A84E20; --leaf:#5B7B4F; --leaf-deep:#415C38; --line:rgba(23,28,20,0.14); --white:#FFFCF6; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{ font-family:'Inter',sans-serif; background:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    background-image: radial-gradient(circle at 25% 25%, rgba(201,98,43,0.18), transparent 50%), radial-gradient(circle at 75% 75%, rgba(91,123,79,0.16), transparent 50%); }
  .card{ background:var(--paper); border-radius:20px; max-width:400px; width:100%; padding:40px 36px; box-shadow:0 30px 80px rgba(0,0,0,0.4); }
  .mark{ width:42px;height:42px;border-radius:11px; background:var(--terracotta); color:var(--white); display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:700; font-size:22px; margin-bottom:20px; }
  h1{ font-family:'Fraunces',serif; font-size:22px; font-weight:600; margin-bottom:6px; color:var(--ink); }
  .sub{ font-size:13px; color:rgba(23,28,20,0.6); margin-bottom:26px; }
  label{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:rgba(23,28,20,0.55); display:block; margin-bottom:6px; }
  input{ width:100%; border:1px solid var(--line); background:var(--white); border-radius:10px; padding:12px 14px; font-size:14px; margin-bottom:16px; font-family:inherit; color:var(--ink); }
  input:focus{ outline:2px solid var(--terracotta); }
  button{ width:100%; background:var(--terracotta); color:var(--white); border:none; border-radius:10px; padding:13px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  button:active{ background:var(--terracotta-deep); }
  .error{ background:rgba(168,57,46,0.1); color:#8A2E22; border-radius:10px; padding:10px 12px; font-size:13px; margin-bottom:16px; display:none; }
  .note{ margin-top:20px; font-size:12px; color:rgba(23,28,20,0.45); text-align:center; line-height:1.5; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">A</div>
    <h1>Panneau Manager</h1>
    <p class="sub">Accès réservé au propriétaire de la plateforme AgriImpact AI.</p>
    <div class="error" id="errorBox"></div>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" required autocomplete="username">
      <label>Mot de passe</label>
      <input type="password" id="password" required autocomplete="current-password">
      <button type="submit">Se connecter</button>
    </form>
    <p class="note">Pas encore de compte ? Exécute <code>npm run create-manager</code> sur le serveur avec MANAGER_EMAIL et MANAGER_PASSWORD définis dans ton .env.</p>
  </div>

<script>
  const API_BASE = window.location.origin;
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('errorBox');
    errorBox.style.display = 'none';
    try {
      const res = await fetch(API_BASE + '/api/manager/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) { errorBox.textContent = data.error || 'Connexion impossible.'; errorBox.style.display = 'block'; return; }
      localStorage.setItem('agriimpact_manager_token', data.token);
      localStorage.setItem('agriimpact_manager_name', data.manager.full_name || data.manager.email);
      window.location.href = '/manager/dashboard.html';
    } catch (err) {
      errorBox.textContent = 'Erreur réseau. Vérifie ta connexion.';
      errorBox.style.display = 'block';
    }
  });
</script>
</body>
</html>
